<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Pinterest галерея</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Светлая тема (по умолчанию) */
        :root {
            --bg-color: #f0f0f0;
            --text-color: #333;
            --board-bg: white;
            --board-border: #e0e0e0;
            --board-hover: #e0e0e0;
            --border-color: #ddd;
            --panel-bg: white;
            --panel-shadow: rgba(0,0,0,0.1);
            --empty-gallery-bg: white;
            --empty-gallery-text: #666;
            --modal-overlay: rgba(0, 0, 0, 0.5);
            --modal-bg: white;
            --modal-text: #333;
            --modal-text-secondary: #666;
            --input-border: #ddd;
            --dropdown-bg: white;
            --dropdown-shadow: rgba(0,0,0,0.2);
            --menu-item-hover: #f5f5f5;
            --selection-counter: #6c757d;
        }

        /* Тёмная тема */
        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --board-bg: #2d2d2d;
            --board-border: #404040;
            --board-hover: #404040;
            --border-color: #404040;
            --panel-bg: #2d2d2d;
            --panel-shadow: rgba(0,0,0,0.3);
            --empty-gallery-bg: #2d2d2d;
            --empty-gallery-text: #aaa;
            --modal-overlay: rgba(0, 0, 0, 0.8);
            --modal-bg: #2d2d2d;
            --modal-text: #f0f0f0;
            --modal-text-secondary: #aaa;
            --input-border: #404040;
            --dropdown-bg: #2d2d2d;
            --dropdown-shadow: rgba(0,0,0,0.5);
            --menu-item-hover: #404040;
            --selection-counter: #aaa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Шапка */
        .header {
            margin-bottom: 30px;
        }

        h1 {
            color: var(--text-color);
            font-size: 28px;
            transition: color 0.3s;
        }

        /* Навигация по доскам */
        .boards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            padding: 20px 0;
            border-bottom: 2px solid var(--border-color);
            align-items: center;
            transition: border-color 0.3s;
        }

        .board-btn {
            padding: 10px 20px;
            background-color: var(--board-bg);
            border: 2px solid var(--board-border);
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            color: var(--text-color);
        }

        .board-btn:hover {
            background-color: var(--board-hover);
            transform: translateY(-2px);
        }

        .board-btn.active {
            background-color: #bd081c;
            color: white;
            border-color: #bd081c;
        }

        .board-btn.protected {
            border-color: #ff6b6b;
            position: relative;
            padding-right: 35px;
        }

        .board-btn.protected::after {
            content: "🔒";
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
        }

        /* Кнопки управления */
        .control-buttons {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .control-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .grid-btn {
            background-color: #9c27b0;
        }

        .grid-btn:hover {
            background-color: #7b1fa2;
            transform: scale(1.1);
        }

        .shuffle-btn {
            background-color: #ff9800;
        }

        .shuffle-btn:hover {
            background-color: #f57c00;
            transform: scale(1.1) rotate(180deg);
        }

        .menu-btn {
            background-color: #4CAF50;
        }

        .menu-btn:hover {
            background-color: #45a049;
            transform: scale(1.1);
        }

        /* Выпадающее меню */
        .dropdown-menu {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 50px;
            background-color: var(--dropdown-bg);
            min-width: 250px;
            box-shadow: 0 8px 16px var(--dropdown-shadow);
            border-radius: 16px;
            z-index: 100;
            padding: 8px;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .dropdown-content.show {
            display: block;
        }

        .menu-item {
            padding: 12px 15px;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s;
            font-size: 15px;
            color: var(--text-color);
        }

        .menu-item:hover {
            background-color: var(--menu-item-hover);
        }

        .menu-item.dark-mode-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-item.delete {
            color: #dc3545;
        }

        .menu-item.delete:hover {
            background-color: #ffebee;
        }

        .menu-divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 8px 0;
            transition: background-color 0.3s;
        }

        /* Темный режим для меню */
        body.dark-mode .menu-item.delete:hover {
            background-color: #442326;
        }

        /* Форма создания доски */
        .create-board-form {
            display: none;
            margin-bottom: 20px;
            padding: 20px;
            background-color: var(--panel-bg);
            border-radius: 16px;
            box-shadow: 0 2px 4px var(--panel-shadow);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .create-board-form.show {
            display: block;
        }

        .form-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .form-group input {
            padding: 10px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            font-size: 14px;
            flex: 1;
            background-color: var(--board-bg);
            color: var(--text-color);
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        .form-group button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .form-group button:hover {
            background-color: #45a049;
        }

        .form-group button.cancel {
            background-color: #6c757d;
        }

        .form-group button.cancel:hover {
            background-color: #5a6268;
        }

        /* Форма загрузки */
        .upload-section {
            display: none;
            margin: 20px 0;
            padding: 20px;
            background-color: var(--panel-bg);
            border-radius: 16px;
            box-shadow: 0 2px 4px var(--panel-shadow);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .upload-section.show {
            display: block;
        }

        .upload-form {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .upload-form input[type="file"] {
            flex: 1;
            padding: 10px;
            border: 2px dashed var(--input-border);
            border-radius: 8px;
            background-color: var(--board-bg);
            color: var(--text-color);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .upload-form button {
            padding: 10px 30px;
            background-color: #bd081c;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .upload-form button:hover {
            background-color: #8f0615;
        }

        /* Панель удаления изображений */
        .delete-panel {
            display: none;
            margin: 20px 0;
            padding: 15px;
            background-color: var(--panel-bg);
            border-radius: 16px;
            box-shadow: 0 2px 4px var(--panel-shadow);
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .delete-panel.show {
            display: flex;
        }

        .delete-panel button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .select-all-btn {
            background-color: #6c757d;
            color: white;
        }

        .select-all-btn:hover {
            background-color: #5a6268;
        }

        .deselect-all-btn {
            background-color: #ffc107;
            color: #333;
        }

        .deselect-all-btn:hover {
            background-color: #e0a800;
        }

        .delete-selected-btn {
            background-color: #dc3545;
            color: white;
        }

        .delete-selected-btn:hover {
            background-color: #c82333;
        }

        .cancel-delete-btn {
            background-color: #6c757d;
            color: white;
            margin-left: auto;
        }

        .cancel-delete-btn:hover {
            background-color: #5a6268;
        }

        .selection-counter {
            color: var(--selection-counter);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }

        /* Галерея */
        .gallery {
            column-gap: 15px;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            transition: opacity 0.3s;
        }

        .gallery[data-columns="1"] { column-count: 1; }
        .gallery[data-columns="2"] { column-count: 2; }
        .gallery[data-columns="3"] { column-count: 3; }
        .gallery[data-columns="4"] { column-count: 4; }
        .gallery[data-columns="5"] { column-count: 5; }
        .gallery[data-columns="6"] { column-count: 6; }
        .gallery[data-columns="7"] { column-count: 7; }
        .gallery[data-columns="8"] { column-count: 8; }

        /* Даже на самых маленьких экранах - точное количество столбцов, которое выбрал пользователь */
        @media (max-width: 479px) {
            .gallery[data-columns="1"] { column-count: 1; }
            .gallery[data-columns="2"] { column-count: 2; }
            .gallery[data-columns="3"] { column-count: 3; }
            .gallery[data-columns="4"] { column-count: 4; }
            .gallery[data-columns="5"] { column-count: 5; }
            .gallery[data-columns="6"] { column-count: 6; }
            .gallery[data-columns="7"] { column-count: 7; }
            .gallery[data-columns="8"] { column-count: 8; }
        }

        .gallery.shuffling {
            opacity: 0.7;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 15px;
            position: relative;
            transition: transform 0.3s ease;
            display: inline-block;
            width: 100%;
        }

        .gallery-item.selectable {
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 4px 6px var(--panel-shadow);
            display: block;
            transition: box-shadow 0.3s;
        }

        .gallery-item:not(.delete-mode) img {
            cursor: pointer;
        }

        .gallery-item.delete-mode img {
            opacity: 0.9;
        }

        .gallery-item:hover img {
            box-shadow: 0 8px 12px var(--panel-shadow);
        }

        /* Чекбокс для выбора изображения */
        .image-checkbox {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--board-bg);
            border: 2px solid #bd081c;
            cursor: pointer;
            z-index: 5;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            pointer-events: auto;
        }

        .delete-mode .image-checkbox {
            display: flex;
        }

        .image-checkbox.selected {
            background-color: #bd081c;
        }

        .image-checkbox.selected::after {
            content: "✓";
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        /* Кнопка удаления отдельного изображения */
        .delete-single-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: rgba(220, 53, 69, 0.9);
            color: white;
            border: none;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
            z-index: 5;
            pointer-events: auto;
        }

        .delete-mode .delete-single-btn {
            display: flex;
        }

        .delete-single-btn:hover {
            transform: scale(1.1);
            background-color: #c82333;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            padding-top: 50px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.9);
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .close:hover {
            color: #bbb;
        }

        .password-modal, .confirm-modal, .grid-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-overlay);
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background-color 0.3s;
        }

        .modal-content-small {
            background-color: var(--modal-bg);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: background-color 0.3s;
        }

        .modal-content-small h3 {
            margin-bottom: 20px;
            color: var(--modal-text);
            transition: color 0.3s;
        }

        .modal-content-small p {
            margin-bottom: 20px;
            color: var(--modal-text-secondary);
            transition: color 0.3s;
        }

        .modal-content-small input,
        .modal-content-small select {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            font-size: 14px;
            background-color: var(--board-bg);
            color: var(--text-color);
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        .modal-content-small .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .modal-content-small button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            flex: 1;
            min-width: 120px;
        }

        /* Слайдер для настройки столбцов */
        .grid-slider-container {
            margin: 20px 0;
        }

        .grid-slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(90deg, #4CAF50 0%, #ff9800 50%, #bd081c 100%);
            outline: none;
            -webkit-appearance: none;
        }

        .grid-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #bd081c;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .grid-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .grid-slider::-moz-range-thumb {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #bd081c;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .grid-slider::-moz-range-thumb:hover {
            transform: scale(1.2);
        }

        .grid-value {
            font-size: 48px;
            font-weight: bold;
            color: #bd081c;
            margin: 10px 0;
        }

        .grid-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            color: var(--modal-text-secondary);
            font-size: 12px;
            transition: color 0.3s;
        }

        .btn-primary {
            background-color: #bd081c;
            color: white;
        }

        .btn-primary:hover {
            background-color: #8f0615;
        }

        .btn-danger {
            background-color: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background-color: #c82333;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #5a6268;
        }

        .btn-success {
            background-color: #28a745;
            color: white;
        }

        .btn-success:hover {
            background-color: #218838;
        }

        .empty-gallery {
            text-align: center;
            padding: 40px 20px;
            color: var(--empty-gallery-text);
            font-size: 16px;
            background-color: var(--empty-gallery-bg);
            border-radius: 16px;
            box-shadow: 0 2px 4px var(--panel-shadow);
            transition: background-color 0.3s, color 0.3s, box-shadow 0.3s;
        }

        /* Мобильные улучшения */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 24px;
            }

            .board-btn {
                padding: 8px 16px;
                font-size: 14px;
            }

            .control-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            .delete-panel button {
                padding: 8px 12px;
                font-size: 13px;
            }

            .modal-content-small {
                padding: 20px;
            }

            .modal-content-small button {
                padding: 10px 15px;
                min-width: 100px;
            }
        }

        /* Для очень маленьких экранов с большим количеством столбцов */
        @media (max-width: 480px) {
            .gallery[data-columns="5"] .gallery-item img,
            .gallery[data-columns="6"] .gallery-item img,
            .gallery[data-columns="7"] .gallery-item img,
            .gallery[data-columns="8"] .gallery-item img {
                border-radius: 8px;
            }
        }

        /* Переключатель темы в меню */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-toggle span {
            font-size: 14px;
        }

        .theme-toggle-switch {
            width: 50px;
            height: 26px;
            background-color: #ccc;
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        body.dark-mode .theme-toggle-switch {
            background-color: #bd081c;
        }

        .theme-toggle-switch::after {
            content: "";
            position: absolute;
            width: 22px;
            height: 22px;
            background-color: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        body.dark-mode .theme-toggle-switch::after {
            transform: translateX(24px);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Моя Pinterest галерея</h1>
    </div>

    <!-- Кнопки досок + меню -->
    <div class="boards-container" id="boardsContainer"></div>

    <!-- Форма создания доски -->
    <div class="create-board-form" id="createBoardForm">
        <div class="form-group">
            <input type="text" id="newBoardName" placeholder="Название доски" required>
            <input type="password" id="newBoardPassword" placeholder="Пароль (необязательно)">
            <button onclick="createNewBoard()">Создать</button>
            <button class="cancel" onclick="toggleCreateBoardForm()">Отмена</button>
        </div>
    </div>

    <!-- Форма загрузки изображений -->
    <div class="upload-section" id="uploadSection">
        <form class="upload-form" id="uploadForm">
            <input type="file" id="imageUpload" accept="image/*" multiple required>
            <button type="submit">Загрузить изображения</button>
        </form>
    </div>

    <!-- Панель удаления изображений -->
    <div class="delete-panel" id="deletePanel">
        <button class="select-all-btn" onclick="selectAllImages()">Выбрать все</button>
        <button class="deselect-all-btn" onclick="deselectAllImages()">Снять выбор</button>
        <button class="delete-selected-btn" onclick="confirmDeleteSelected()">Удалить выбранные</button>
        <span class="selection-counter" id="selectionCounter">Выбрано: 0</span>
        <button class="cancel-delete-btn" onclick="exitDeleteMode()">Отмена</button>
    </div>

    <!-- Галерея -->
    <div class="gallery" id="gallery" data-columns="4"></div>

    <!-- Модальное окно для увеличенного изображения -->
    <div id="imageModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <!-- Модальное окно для ввода пароля -->
    <div id="passwordModal" class="password-modal">
        <div class="modal-content-small">
            <h3>Введите пароль</h3>
            <input type="password" id="boardPassword" placeholder="Пароль">
            <div class="buttons">
                <button class="btn-success" onclick="checkPassword()">Подтвердить</button>
                <button class="btn-secondary" onclick="closePasswordModal()">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно для удаления доски -->
    <div id="deleteBoardModal" class="password-modal">
        <div class="modal-content-small">
            <h3>Удаление доски</h3>
            <p>Выберите доску для удаления:</p>
            <select id="boardToDelete" class="board-select"></select>
            <div class="buttons">
                <button class="btn-danger" onclick="confirmDeleteBoard()">Удалить</button>
                <button class="btn-secondary" onclick="closeDeleteBoardModal()">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно подтверждения -->
    <div id="confirmModal" class="password-modal">
        <div class="modal-content-small">
            <h3 id="confirmTitle">Подтверждение</h3>
            <p id="confirmMessage">Вы уверены?</p>
            <div class="buttons">
                <button class="btn-danger" id="confirmYesBtn">Да</button>
                <button class="btn-secondary" onclick="closeConfirmModal()">Нет</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно настройки сетки -->
    <div id="gridModal" class="grid-modal">
        <div class="modal-content-small">
            <h3>Настройка сетки</h3>
            <p>Количество столбцов: <span id="gridValue">4</span></p>
            
            <div class="grid-slider-container">
                <input type="range" id="gridSlider" class="grid-slider" min="1" max="8" value="4" step="1">
                <div class="grid-labels">
                    <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span>
                </div>
            </div>
            
            <div class="buttons">
                <button class="btn-primary" onclick="applyGridSettings()">Применить</button>
                <button class="btn-secondary" onclick="closeGridModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        // Состояние приложения
        let boards = JSON.parse(localStorage.getItem('boards')) || {
            'Основная': { password: null, images: [] }
        };
        let currentBoard = 'Основная';
        let pendingBoardAccess = null;
        let selectedImages = new Set();
        let deleteMode = false;
        
        // Настройки сетки
        let gridSettings = JSON.parse(localStorage.getItem('gridSettings')) || { columns: 4 };
        
        // Настройки темы
        let darkMode = localStorage.getItem('darkMode') === 'true';

        // Инициализация
        function init() {
            applyTheme();
            applyGridSettingsFromStorage();
            renderBoards();
            renderGallery();
        }

        // Применение темы
        function applyTheme() {
            if (darkMode) {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        }

        // Переключение темы
        function toggleDarkMode() {
            darkMode = !darkMode;
            localStorage.setItem('darkMode', darkMode);
            applyTheme();
            // Обновляем меню, чтобы показать актуальное состояние переключателя
            renderBoards();
        }

        // Применение настроек сетки из хранилища
        function applyGridSettingsFromStorage() {
            const gallery = document.getElementById('gallery');
            gallery.setAttribute('data-columns', gridSettings.columns);
            document.getElementById('gridSlider').value = gridSettings.columns;
            document.getElementById('gridValue').textContent = gridSettings.columns;
        }

        // Сохранение настроек сетки
        function saveGridSettings() {
            localStorage.setItem('gridSettings', JSON.stringify(gridSettings));
            const gallery = document.getElementById('gallery');
            gallery.setAttribute('data-columns', gridSettings.columns);
        }

        // Открытие модального окна настройки сетки
        function openGridModal() {
            document.getElementById('gridSlider').value = gridSettings.columns;
            document.getElementById('gridValue').textContent = gridSettings.columns;
            document.getElementById('gridModal').style.display = 'flex';
            closeMenu();
        }

        // Закрытие модального окна сетки
        function closeGridModal() {
            document.getElementById('gridModal').style.display = 'none';
        }

        // Применение настроек сетки
        function applyGridSettings() {
            const slider = document.getElementById('gridSlider');
            gridSettings.columns = parseInt(slider.value);
            saveGridSettings();
            renderGallery();
            closeGridModal();
        }

        // Обновление значения при изменении слайдера
        document.getElementById('gridSlider')?.addEventListener('input', function(e) {
            document.getElementById('gridValue').textContent = e.target.value;
        });

        // Сохранение в localStorage
        function saveToStorage() {
            localStorage.setItem('boards', JSON.stringify(boards));
        }

        // Отображение кнопок досок
        function renderBoards() {
            const container = document.getElementById('boardsContainer');
            container.innerHTML = '';

            // Кнопки досок
            Object.keys(boards).forEach(boardName => {
                const btn = document.createElement('button');
                btn.className = `board-btn ${boardName === currentBoard ? 'active' : ''} ${boards[boardName].password ? 'protected' : ''}`;
                btn.textContent = boardName;
                btn.onclick = () => switchBoard(boardName);
                container.appendChild(btn);
            });

            // Контейнер для кнопок управления
            const controlsDiv = document.createElement('div');
            controlsDiv.className = 'control-buttons';

            // Кнопка настройки сетки
            const gridBtn = document.createElement('button');
            gridBtn.className = 'control-btn grid-btn';
            gridBtn.innerHTML = '⊞';
            gridBtn.title = 'Настройка сетки';
            gridBtn.onclick = openGridModal;
            controlsDiv.appendChild(gridBtn);

            // Кнопка перемешивания
            const shuffleBtn = document.createElement('button');
            shuffleBtn.className = 'control-btn shuffle-btn';
            shuffleBtn.innerHTML = '↻';
            shuffleBtn.title = 'Перемешать изображения';
            shuffleBtn.onclick = shuffleImages;
            controlsDiv.appendChild(shuffleBtn);

            // Кнопка меню
            const menuBtn = document.createElement('button');
            menuBtn.className = 'control-btn menu-btn';
            menuBtn.innerHTML = '☰';
            menuBtn.onclick = toggleMenu;
            controlsDiv.appendChild(menuBtn);

            container.appendChild(controlsDiv);

            // Выпадающее меню
            const dropdown = document.createElement('div');
            dropdown.className = 'dropdown-menu';
            dropdown.innerHTML = `
                <div class="dropdown-content" id="dropdownContent">
                    <div class="menu-item" onclick="toggleCreateBoardForm()">➕ Создать новую доску</div>
                    <div class="menu-item" onclick="toggleUploadForm()">📤 Загрузить изображения</div>
                    <div class="menu-item" onclick="enterDeleteMode()">🗑 Удалить изображения</div>
                    <div class="menu-divider"></div>
                    <div class="menu-item dark-mode-toggle" onclick="toggleDarkMode()">
                        <span>🌓 Ночной режим</span>
                        <div class="theme-toggle-switch"></div>
                    </div>
                    <div class="menu-divider"></div>
                    <div class="menu-item delete" onclick="showDeleteBoardModal()">❌ Удалить доску</div>
                </div>
            `;
            container.appendChild(dropdown);
        }

        // Перемешивание изображений
        function shuffleImages() {
            const images = boards[currentBoard]?.images;
            if (!images || images.length === 0) {
                alert('Нет изображений для перемешивания');
                return;
            }

            const gallery = document.getElementById('gallery');
            gallery.classList.add('shuffling');

            // Алгоритм Фишера-Йейтса
            for (let i = images.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [images[i], images[j]] = [images[j], images[i]];
            }

            saveToStorage();
            
            setTimeout(() => {
                renderGallery();
                gallery.classList.remove('shuffling');
            }, 200);
        }

        // Переключение меню
        function toggleMenu() {
            const dropdown = document.getElementById('dropdownContent');
            dropdown.classList.toggle('show');
            
            if (dropdown.classList.contains('show')) {
                document.addEventListener('click', closeMenuOnClickOutside);
            }
        }

        function closeMenuOnClickOutside(event) {
            const dropdown = document.getElementById('dropdownContent');
            const menuBtn = document.querySelector('.menu-btn');
            
            if (!dropdown.contains(event.target) && !menuBtn.contains(event.target)) {
                dropdown.classList.remove('show');
                document.removeEventListener('click', closeMenuOnClickOutside);
            }
        }

        function closeMenu() {
            document.getElementById('dropdownContent').classList.remove('show');
        }

        // Переключение формы создания доски
        function toggleCreateBoardForm() {
            const form = document.getElementById('createBoardForm');
            form.classList.toggle('show');
            closeMenu();
        }

        // Переключение формы загрузки
        function toggleUploadForm() {
            const form = document.getElementById('uploadSection');
            form.classList.toggle('show');
            closeMenu();
        }

        // Вход в режим удаления
        function enterDeleteMode() {
            deleteMode = true;
            document.getElementById('deletePanel').classList.add('show');
            closeMenu();
            renderGallery();
        }

        // Выход из режима удаления
        function exitDeleteMode() {
            deleteMode = false;
            document.getElementById('deletePanel').classList.remove('show');
            selectedImages.clear();
            renderGallery();
        }

        // Создание новой доски
        function createNewBoard() {
            const name = document.getElementById('newBoardName').value.trim();
            const password = document.getElementById('newBoardPassword').value.trim();

            if (!name) {
                alert('Введите название доски');
                return;
            }

            if (boards[name]) {
                alert('Доска с таким названием уже существует');
                return;
            }

            boards[name] = {
                password: password || null,
                images: []
            };

            saveToStorage();
            renderBoards();
            
            document.getElementById('newBoardName').value = '';
            document.getElementById('newBoardPassword').value = '';
            toggleCreateBoardForm();
        }

        // Переключение доски
        function switchBoard(boardName) {
            if (boards[boardName].password) {
                pendingBoardAccess = boardName;
                document.getElementById('passwordModal').style.display = 'flex';
            } else {
                currentBoard = boardName;
                renderBoards();
                exitDeleteMode();
                renderGallery();
            }
        }

        // Проверка пароля
        function checkPassword() {
            const password = document.getElementById('boardPassword').value;
            if (pendingBoardAccess && boards[pendingBoardAccess].password === password) {
                currentBoard = pendingBoardAccess;
                renderBoards();
                renderGallery();
                closePasswordModal();
            } else {
                alert('Неверный пароль!');
            }
            document.getElementById('boardPassword').value = '';
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
            pendingBoardAccess = null;
            document.getElementById('boardPassword').value = '';
        }

        // Показать модальное окно удаления доски
        function showDeleteBoardModal() {
            const select = document.getElementById('boardToDelete');
            select.innerHTML = '';
            
            Object.keys(boards).forEach(boardName => {
                if (boardName !== 'Основная') {
                    const option = document.createElement('option');
                    option.value = boardName;
                    option.textContent = boardName + (boards[boardName].password ? ' (защищена)' : '');
                    select.appendChild(option);
                }
            });
            
            document.getElementById('deleteBoardModal').style.display = 'flex';
            closeMenu();
        }

        function closeDeleteBoardModal() {
            document.getElementById('deleteBoardModal').style.display = 'none';
        }

        // Подтверждение удаления доски
        function confirmDeleteBoard() {
            const boardName = document.getElementById('boardToDelete').value;
            if (boardName) {
                showConfirmDialog(
                    'Удаление доски',
                    `Вы уверены, что хотите удалить доску "${boardName}"? Все изображения будут безвозвратно удалены.`,
                    () => {
                        deleteBoard(boardName);
                        closeDeleteBoardModal();
                    }
                );
            }
        }

        // Удаление доски
        function deleteBoard(boardName) {
            delete boards[boardName];
            
            if (currentBoard === boardName) {
                currentBoard = 'Основная';
            }
            
            saveToStorage();
            renderBoards();
            renderGallery();
        }

        // Загрузка изображений
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const files = document.getElementById('imageUpload').files;
            
            if (files.length === 0) return;

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    if (!boards[currentBoard].images) {
                        boards[currentBoard].images = [];
                    }
                    
                    boards[currentBoard].images.push({
                        src: event.target.result,
                        name: file.name,
                        date: new Date().toISOString(),
                        id: Date.now() + Math.random() + file.name
                    });
                    
                    saveToStorage();
                    renderGallery();
                };
                reader.readAsDataURL(file);
            });

            document.getElementById('imageUpload').value = '';
        });

        // Отображение галереи
        function renderGallery() {
            const gallery = document.getElementById('gallery');
            const images = boards[currentBoard]?.images || [];

            if (images.length === 0) {
                gallery.innerHTML = '<div class="empty-gallery">Загрузите изображения в эту доску</div>';
                updateSelectionCounter();
                return;
            }

            let html = '';
            images.forEach(img => {
                const isSelected = selectedImages.has(img.id);
                html += `
                    <div class="gallery-item ${deleteMode ? 'delete-mode' : ''}" data-id="${img.id}">
                        <div class="image-checkbox ${isSelected ? 'selected' : ''}" onclick="toggleImageSelection('${img.id}', event)"></div>
                        <img src="${img.src}" alt="${img.name}" onclick="handleImageClick('${img.id}', '${img.src.replace(/'/g, "\\'")}')">
                        <button class="delete-single-btn" onclick="confirmDeleteImage('${img.id}', event)">✕</button>
                    </div>
                `;
            });
            
            gallery.innerHTML = html;
            updateSelectionCounter();
        }

        // Обработка клика по изображению
        function handleImageClick(imageId, imgSrc) {
            if (deleteMode) {
                toggleImageSelection(imageId, event);
            } else {
                openModal(imgSrc);
            }
        }

        // Переключение выбора изображения
        function toggleImageSelection(imageId, event) {
            event.stopPropagation();
            event.preventDefault();
            
            if (selectedImages.has(imageId)) {
                selectedImages.delete(imageId);
            } else {
                selectedImages.add(imageId);
            }
            
            const checkbox = event.target;
            if (selectedImages.has(imageId)) {
                checkbox.classList.add('selected');
            } else {
                checkbox.classList.remove('selected');
            }
            
            updateSelectionCounter();
        }

        // Выбрать все изображения
        function selectAllImages() {
            const images = boards[currentBoard]?.images || [];
            images.forEach(img => selectedImages.add(img.id));
            updateSelectionCounter();
            renderGallery();
        }

        // Снять выбор со всех
        function deselectAllImages() {
            selectedImages.clear();
            updateSelectionCounter();
            renderGallery();
        }

        // Обновление счетчика
        function updateSelectionCounter() {
            document.getElementById('selectionCounter').textContent = `Выбрано: ${selectedImages.size}`;
        }

        // Подтверждение удаления одного изображения
        function confirmDeleteImage(imageId, event) {
            event.stopPropagation();
            event.preventDefault();
            
            showConfirmDialog(
                'Удаление изображения',
                'Вы уверены, что хотите удалить это изображение?',
                () => deleteSingleImage(imageId)
            );
        }

        // Удаление одного изображения
        function deleteSingleImage(imageId) {
            const images = boards[currentBoard].images;
            const index = images.findIndex(img => img.id === imageId);
            
            if (index !== -1) {
                images.splice(index, 1);
                selectedImages.delete(imageId);
                saveToStorage();
                
                if (images.length === 0) {
                    exitDeleteMode();
                } else {
                    renderGallery();
                }
            }
        }

        // Подтверждение удаления выбранных
        function confirmDeleteSelected() {
            if (selectedImages.size === 0) {
                alert('Нет выбранных изображений');
                return;
            }

            showConfirmDialog(
                'Удаление изображений',
                `Вы уверены, что хотите удалить ${selectedImages.size} изображение(й)?`,
                deleteSelectedImages
            );
        }

        // Удаление нескольких изображений
        function deleteSelectedImages() {
            const images = boards[currentBoard].images;
            boards[currentBoard].images = images.filter(img => !selectedImages.has(img.id));
            selectedImages.clear();
            saveToStorage();
            
            if (boards[currentBoard].images.length === 0) {
                exitDeleteMode();
            } else {
                renderGallery();
            }
        }

        // Показать диалог подтверждения
        function showConfirmDialog(title, message, onConfirm) {
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmYesBtn').onclick = () => {
                onConfirm();
                closeConfirmModal();
            };
            document.getElementById('confirmModal').style.display = 'flex';
        }

        // Закрытие модальных окон
        function closeConfirmModal() {
            document.getElementById('confirmModal').style.display = 'none';
        }

        function openModal(imgSrc) {
            document.getElementById('modalImage').src = imgSrc;
            document.getElementById('imageModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // Закрытие по Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                closePasswordModal();
                closeConfirmModal();
                closeDeleteBoardModal();
                closeGridModal();
                document.getElementById('dropdownContent').classList.remove('show');
                if (deleteMode) {
                    exitDeleteMode();
                }
            }
        });

        // Инициализация
        init();
    </script>
</body>
</html>
